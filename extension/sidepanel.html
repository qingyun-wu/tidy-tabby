<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tidy Tabby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>

<div class="sp-header">
  <span class="sp-title">Tidy Tabby</span>
  <div class="sp-tabs">
    <button class="sp-tab active" data-sp-tab="tabs">Tabs</button>
    <button class="sp-tab" data-sp-tab="chat">AI Chat</button>
  </div>
</div>

<!-- Tabs panel -->
<div class="sp-panel" id="spPanelTabs">
  <input type="text" class="sp-search" id="spSearch" placeholder="Filter tabs..." autocomplete="off">
  <div class="sp-tab-list" id="spTabList"></div>
</div>

<!-- Chat panel -->
<div class="sp-panel" id="spPanelChat" style="display:none">
  <div class="sp-chat-messages" id="spChatMessages">
    <div class="sp-msg sp-msg-assistant">Hi! Ask me anything about your tabs.</div>
  </div>
  <form class="sp-chat-form" id="spChatForm">
    <input type="text" class="sp-chat-input" id="spChatInput" placeholder="Ask me anything..." autocomplete="off">
    <button type="submit" class="sp-chat-send">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="14" height="14">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
      </svg>
    </button>
  </form>
</div>

<script src="sidepanel.js"></script>
</body>
</html>
